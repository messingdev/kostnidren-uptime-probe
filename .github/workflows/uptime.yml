# GitHub Actions workflow — external multi-URL uptime probe.
#
# Probes a curated list of critical URLs every 5 min from GitHub's runners,
# aggregates results, and alerts Telegram once per run if any URL fails.
# All-clean → silent.
#
# Required secrets in this repo (Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN  — same value as Trellis vault_telegram_bot_token
#   TELEGRAM_CHAT_ID    — same value as Trellis vault_telegram_chat_id
#
# Per-URL classification:
#   curl error (DNS/TLS/timeout) → "down"   (counts as failure → P0)
#   HTTP 5xx                     → "5xx"    (counts as failure → P0)
#   HTTP 2xx/3xx with >10 s      → "slow"   (warning   → P1)
#   HTTP 2xx/3xx with ≤10 s      → "ok"     (silent)
#   HTTP 4xx                     → "4xx"    (silent — clients problem, site is up)
#
# Run-level severity:
#   any "down" or "5xx"  → P0
#   any "slow" only      → P1
#   only "ok" / "4xx"    → silent

name: Uptime probe — registr.kostnidren.cz

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: uptime-probe
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Probe URLs
        id: probe
        shell: bash
        env:
          BASE_URL: https://registr.kostnidren.cz
          PATHS: |
            /
            /prihlasit-se
            /chci-pomoct
            /o-registru/historie/
            /o-registru/vyrocni-zpravy/
            /registracni-centra/
            /wp-json/wp/v2/types
            /kontakt/
          SLOW_THRESHOLD_S: "10"
        run: |
          set +e
          declare -a results=()
          while IFS= read -r path; do
            [[ -z "${path// }" ]] && continue
            url="${BASE_URL}${path}"
            response=$(curl -sS --max-time 15 \
              -o /dev/null \
              -w "code=%{http_code} latency=%{time_total}" \
              -H "User-Agent: kostnidren-uptime-probe/1.0 (+gh-actions)" \
              "$url")
            curl_exit=$?
            code=$(echo "$response" | sed -n 's/.*code=\([0-9]*\).*/\1/p')
            latency=$(echo "$response" | sed -n 's/.*latency=\([0-9.]*\).*/\1/p')
            code=${code:-0}
            latency=${latency:-0}

            if (( curl_exit != 0 )); then
              cls="down"
            elif (( code >= 500 )); then
              cls="5xx"
            elif (( code >= 400 )); then
              cls="4xx"
            elif (( $(echo "$latency > $SLOW_THRESHOLD_S" | bc -l 2>/dev/null || echo 0) )); then
              cls="slow"
            else
              cls="ok"
            fi

            line="${cls}|${code}|${latency}|${path}|${curl_exit}"
            echo "  $line"
            results+=("$line")
          done <<< "$PATHS"

          # Persist to file for downstream step (handles multi-line cleanly).
          printf '%s\n' "${results[@]}" > /tmp/results.txt
          echo "result_file=/tmp/results.txt" >> "$GITHUB_OUTPUT"

      - name: Probe homepage content markers (GTM + page-defining string)
        id: markers
        shell: bash
        env:
          BASE_URL: https://registr.kostnidren.cz
          GTM_MARKER: GTM-MTJHH4VX
          CONTENT_MARKER: kostnidren
        run: |
          set +e
          body=$(curl -sS --max-time 15 -A "kostnidren-uptime-probe/1.0" "${BASE_URL}/")
          curl_exit=$?
          missing=""
          if (( curl_exit != 0 )); then
            echo "curl failed exit=$curl_exit — skipping marker check"
          else
            grep -q "$GTM_MARKER" <<<"$body"     || missing+="GTM,"
            grep -qi "$CONTENT_MARKER" <<<"$body" || missing+="content,"
          fi
          echo "missing=${missing%,}" >> "$GITHUB_OUTPUT"

      - name: Decide whether to alert
        id: decide
        shell: bash
        env:
          MARKERS_MISSING: ${{ steps.markers.outputs.missing }}
        run: |
          down=0; xx5=0; slow=0; ok=0; xx4=0
          down_list=""; xx5_list=""; slow_list=""
          while IFS='|' read -r cls code latency path curl_exit; do
            [[ -z "$cls" ]] && continue
            case "$cls" in
              down) down=$((down+1)); down_list+="• ${path} (síťová chyba)\n" ;;
              5xx)  xx5=$((xx5+1));   xx5_list+="• ${path} (HTTP ${code})\n" ;;
              slow) slow=$((slow+1)); slow_list+="• ${path} (${latency}s)\n" ;;
              4xx)  xx4=$((xx4+1)) ;;
              ok)   ok=$((ok+1)) ;;
            esac
          done < /tmp/results.txt

          total=$((down + xx5 + slow + ok + xx4))
          fails=$((down + xx5))
          warns=$slow

          # Marker findings (only meaningful when homepage itself returned 2xx).
          gtm_missing=0; content_missing=0
          [[ "$MARKERS_MISSING" == *GTM* ]]     && gtm_missing=1
          [[ "$MARKERS_MISSING" == *content* ]] && content_missing=1

          if (( fails > 0 )); then
            severity=P0
            title="Web nedostupný na některých stránkách (${fails}/${total})"
            body="Tyto stránky teď nejdou návštěvníkům normálně otevřít:\n${down_list}${xx5_list}\nMá smysl je hned zkontrolovat v prohlížeči."
          elif (( content_missing == 1 )); then
            severity=P0
            title="Domovská stránka má rozbitý obsah"
            body="Web vrátil HTTP 200, ale obsah neobsahuje očekávanou identifikaci stránky. Šablona se zřejmě sype — návštěvníci možná vidí prázdnou nebo polámanou stránku. Otevři web v prohlížeči."
          elif (( gtm_missing == 1 )); then
            severity=P1
            title="Analytika je rozbitá — GTM neběží"
            body="Web jede, ale Google Tag Manager se nenačetl do HTML domovské stránky. Všechny statistiky (návštěvy, konverze, formuláře) teď neslyší. Pravděpodobně poslední deploy odstranil tracking kód."
          elif (( warns > 0 )); then
            severity=P1
            title="Web odpovídá pomalu na některých stránkách (${warns}/${total})"
            body="Tyto stránky se načítaly přes 10 sekund. Návštěvníci možná odejdou:\n${slow_list}"
          else
            severity=skip
          fi

          {
            echo "severity=$severity"
            printf 'title<<EOF\n%s\nEOF\n' "$title"
            printf 'body<<EOF\n%b\nEOF\n'  "$body"
            echo "tech=down=$down 5xx=$xx5 4xx=$xx4 slow=$slow ok=$ok total=$total markers_missing=${MARKERS_MISSING:-none}"
          } >> "$GITHUB_OUTPUT"

      - name: Send Telegram alert
        if: steps.decide.outputs.severity != 'skip' && steps.decide.outputs.severity != ''
        env:
          TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT:     ${{ secrets.TELEGRAM_CHAT_ID }}
          SEVERITY: ${{ steps.decide.outputs.severity }}
          TITLE:    ${{ steps.decide.outputs.title }}
          BODY:     ${{ steps.decide.outputs.body }}
          TECH:     ${{ steps.decide.outputs.tech }}
        shell: bash
        run: |
          html_escape() {
            printf '%s' "$1" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'
          }
          case "$SEVERITY" in
            P0) emoji="🔴" ;;
            P1) emoji="🟡" ;;
            *)  emoji="⚪" ;;
          esac
          ts=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          text=$(printf '%s %s\n\n%s\n\n%s' \
            "$emoji" "<b>$(html_escape "$TITLE")</b>" \
            "$(html_escape "$BODY")" \
            "<i>Detail pro vývojáře: $(html_escape "$TECH") · ${ts}</i>")

          response=$(curl -sS --max-time 10 \
            -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=${text}")
          echo "$response"
          echo "$response" | grep -q '"ok":true'
